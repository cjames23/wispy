# Zensical configuration for the wispy documentation site.
#
# Build:    hatch run docs:build
# Preview:  hatch run docs:serve  (then open http://localhost:8000)
# Deploy:   hatch run docs:deploy
#
# See https://zensical.org/docs/setup/basics/ for the full settings reference.

[project]
site_name = "wispy"
site_description = "The whitespace between your workflow tool and everything that talks to it — a Python library implementing the Workflow Server Protocol (WSP)."
site_author = "Cary Hawkins"
site_url = "https://cjames23.github.io/wispy/"
copyright = "&copy; 2026 Cary Hawkins"
docs_dir = "docs"
site_dir = "site"

[project.repo]
url = "https://github.com/cjames23/wispy/"
name = "cjames23/wispy"

[project.theme]
variant = "modern"

[[project.nav]]
title = "Home"
path = "index.md"

[[project.nav]]
title = "Getting started"
path = "getting-started.md"

